services:
  postgres:
    container_name: postgres-sql
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - ninjasmoke
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak-postgres:
    container_name: keycloak-postgres
    image: postgres:16
    environment:
      POSTGRES_DB: ${KEYCLOAK_POSTGRES_DB}
      POSTGRES_USER: ${KEYCLOAK_POSTGRES_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - keycloak-postgres:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - ninjasmoke
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak:24.0.2
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}

      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/${KEYCLOAK_POSTGRES_DB}
      KC_DB_USERNAME: ${KEYCLOAK_POSTGRES_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_POSTGRES_PASSWORD}

      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded

      KC_HTTP_RELATIVE_PATH: /auth
      KC_HOSTNAME_URL: http://app.local/auth
      KC_HOSTNAME_ADMIN_URL: http://app.local/auth
    volumes:
      - ./ops/keycloak/import:/opt/keycloak/data/import:ro
    networks:
      - ninjasmoke
    restart: unless-stopped
    command:
      - "start"
      - "--http-port=8080"
      - "--import-realm"

  nginx:
    container_name: nginx
    image: nginx:1.27
    depends_on:
      - keycloak
    ports:
      - "80:80"
    volumes:
      - ./ops/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      ninjasmoke:
        aliases:
          - app.local
    restart: unless-stopped

  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4:8
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - ninjasmoke
    restart: unless-stopped

  mail-dev:
    container_name: mail-dev
    image: maildev/maildev:2.2.1
    ports:
      - "1080:1080"
      - "1025:1025"
    networks:
      - ninjasmoke
    restart: unless-stopped

networks:
  ninjasmoke:
    driver: bridge

volumes:
  postgres:
    driver: local
  keycloak-postgres:
    driver: local
  pgadmin:
    driver: local